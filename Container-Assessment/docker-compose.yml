name: muchtodo

services:
  mongodb:
    image: mongo:8.0
    container_name: muchtodo-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_INITDB_ROOT_USERNAME}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_INITDB_ROOT_PASSWORD}"
      MONGO_INITDB_DATABASE: "${DB_NAME}"
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"quit(db.adminCommand({ ping: 1 }).ok ? 0 : 1)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - muchtodo

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: muchtodo-backend:local
    container_name: muchtodo-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      PORT: "${PORT}"
      MONGO_URI: "${MONGO_URI}"
      DB_NAME: "${DB_NAME}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
      JWT_EXPIRATION_HOURS: "${JWT_EXPIRATION_HOURS}"
      ENABLE_CACHE: "${ENABLE_CACHE}"
      LOG_LEVEL: "${LOG_LEVEL}"
      LOG_FORMAT: "${LOG_FORMAT}"
    ports:
      - "${APP_PORT}:8080"
    networks:
      - muchtodo

volumes:
  mongo-data:

networks:
  muchtodo:
    driver: bridge
