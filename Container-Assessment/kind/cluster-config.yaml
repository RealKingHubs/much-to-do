# Configuration for a local Kubernetes cluster using 'kind' (Kubernetes in Docker)
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

nodes:
  # Define the Control Plane node (the master node that manages the cluster)
  - role: control-plane
    
    # Custom patches to the Kubernetes setup during initialization
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            # Add a label to this node so an Ingress Controller knows it can run here
            node-labels: "ingress-ready=true"
            
    # Map ports from your physical computer (host) to the kind container
    extraPortMappings:
      # Standard HTTP traffic
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      # Standard HTTPS (SSL) traffic
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      # Custom port often used for NodePort services (like this Go backend)
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
