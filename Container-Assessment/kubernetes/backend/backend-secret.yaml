# Sensitive credentials and connection strings for the backend application
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  # Placed in the 'muchtodo' namespace so the backend deployment can access it
  namespace: muchtodo
type: Opaque
stringData:
  # The full connection string for MongoDB. 
  # It uses the internal Kubernetes DNS name (mongodb.muchtodo.svc.cluster.local) 
  # to find the database service created earlier.
  MONGO_URI: mongodb://muchtodo:muchtodo@mongodb.muchtodo.svc.cluster.local:27017/much_todo_db?authSource=admin
  
  # The secret key used for signing JWT authentication tokens.
  # Note: This should be a long, random string in a real environment.
  JWT_SECRET_KEY: change-me-before-production
