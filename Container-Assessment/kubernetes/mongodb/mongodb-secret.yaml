# A Kubernetes Secret to securely store sensitive database credentials
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  # Placed in the 'muchtodo' namespace to match the database and backend
  namespace: muchtodo
# 'Opaque' is the default type for arbitrary user-defined data (passwords, keys, etc.)
type: Opaque
# 'stringData' allows you to provide values in plain text for convenience; 
# Kubernetes will automatically base64 encode them when the Secret is created.
stringData:
  MONGO_INITDB_ROOT_USERNAME: muchtodo
  MONGO_INITDB_ROOT_PASSWORD: muchtodo
