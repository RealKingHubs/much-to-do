name: Backend CI/CD

on:
  push:
    branches:
      - main
      - feature/full-stack

    paths:
      - 'Server/**'
      - '.github/workflows/backend-ci-cd.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: 093796422475.dkr.ecr.us-east-1.amazonaws.com/dev-starttech-backend
  IMAGE_TAG: latest

jobs:

  # =========================================
  # TEST STAGE
  # =========================================

  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Server/MuchToDo

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download Dependencies
        run: go mod download

      - name: Run Unit Tests
        run: go test ./... -v

      - name: Run Go Vet
        run: go vet ./...

      - name: Install Gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run Gosec
        run: |
          $(go env GOPATH)/bin/gosec ./...

  # =========================================
  # BUILD & PUSH
  # =========================================

  build-and-push:
    runs-on: ubuntu-latest

    needs: test

    defaults:
      run:
        working-directory: Server/MuchToDo

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::093796422475:role/GitHubActionsStartTechRole
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build \
            -t $ECR_REPOSITORY:$IMAGE_TAG \
            .

      - name: Tag Docker Image
        run: |
          docker tag \
          $ECR_REPOSITORY:$IMAGE_TAG \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -

          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list

          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan Docker Image
        run: |
          trivy image \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            $ECR_REPOSITORY:$IMAGE_TAG

      - name: Push Docker Image
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Set Image Output
        id: image
        run: |
          echo "image=${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # =========================================
  # DEPLOY STAGE
  # =========================================

  deploy:
    runs-on: ubuntu-latest

    needs: build-and-push

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::093796422475:role/GitHubActionsStartTechRole
          aws-region: us-east-1

      - name: Deploy Backend
        run: |
          chmod +x scripts/deploy-backend.sh

          ./scripts/deploy-backend.sh \
          ${{ needs.build-and-push.outputs.image }}

      - name: Smoke Test
        run: |
          chmod +x scripts/health-check.sh

          ./scripts/health-check.sh \
          http://${{ secrets.ALB_DNS_NAME }}

      - name: Deployment Success
        run: echo "Backend deployment completed successfully"