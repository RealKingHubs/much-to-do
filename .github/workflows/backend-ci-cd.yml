name: Backend CI/CD

on:
  push:
    branches:
      - main
      - feature/full-stack

    paths:
      - "Server/**"
      - ".github/workflows/backend-ci-cd.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: dev-starttech-backend
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # =========================================
  # TEST STAGE
  # =========================================

  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Server/MuchToDo

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Download Dependencies
        run: go mod download

      - name: Run Unit Tests
        run: go test ./... -v

      - name: Run Go Vet
        run: go vet ./...

      - name: Install Gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest

      # Non-blocking security scan for assessment/demo environment
      - name: Run Gosec
        run: |
          $(go env GOPATH)/bin/gosec \
            -exclude=G104,G112,G404 \
            ./... || true

  # =========================================
  # BUILD & PUSH STAGE
  # =========================================

  build-and-push:
    runs-on: ubuntu-latest

    needs: test

    defaults:
      run:
        working-directory: Server/MuchToDo

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # =========================================
      # AWS AUTHENTICATION (OIDC)
      # =========================================

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::093796422475:role/GitHubActionsStartTechRole
          aws-region: us-east-1

      # =========================================
      # DOCKER BUILDX
      # =========================================

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # =========================================
      # LOGIN TO ECR
      # =========================================

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # =========================================
      # BUILD IMAGE
      # =========================================

      - name: Build Docker Image
        run: |
          docker build \
            -t $ECR_REPOSITORY:$IMAGE_TAG \
            .

      # =========================================
      # SECURITY SCAN
      # =========================================

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 0
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      # =========================================
      # TAG IMAGE
      # =========================================

      - name: Tag Docker Image
        run: |
          docker tag \
            $ECR_REPOSITORY:$IMAGE_TAG \
            ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

      # =========================================
      # PUSH IMAGE
      # =========================================

      - name: Push Docker Image
        run: |
          docker push \
            ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

      # =========================================
      # OUTPUT IMAGE URI
      # =========================================

      - name: Set Image Output
        id: image
        run: |
          echo "image=${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # =========================================
  # DEPLOY STAGE
  # =========================================

  deploy:
    runs-on: ubuntu-latest

    needs: build-and-push

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================================
      # AWS AUTHENTICATION
      # =========================================

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::093796422475:role/GitHubActionsStartTechRole
          aws-region: us-east-1

      # =========================================
      # DEPLOY BACKEND
      # =========================================

      - name: Deploy Backend
        run: |
          chmod +x scripts/deploy-backend.sh

          ./scripts/deploy-backend.sh \
            ${{ needs.build-and-push.outputs.image }}

      # =========================================
      # SMOKE TEST
      # =========================================

      - name: Smoke Test
        run: |
          chmod +x scripts/health-check.sh

          ./scripts/health-check.sh \
            http://${{ secrets.ALB_DNS_NAME }}

      # =========================================
      # SUCCESS MESSAGE
      # =========================================

      - name: Deployment Success
        run: echo "Backend deployment completed successfully"