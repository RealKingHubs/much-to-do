name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - main
      - feature/full-stack
    paths:
      - "Server/**"
      - ".github/workflows/backend-ci-cd.yml"

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: dev-starttech-backend

permissions:
  id-token: write
  contents: read

jobs:
  backend-ci:
    name: Backend Test & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Server/MuchToDo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # Configure AWS Credentials
      # =========================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::093796422475:role/GitHubActionsStartTechRole
          aws-region: us-east-1

      # =========================
      # Setup Go
      # =========================
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      # =========================
      # Install Dependencies
      # =========================
      - name: Install dependencies
        run: go mod download

      # =========================
      # Run Tests
      # =========================
      - name: Run tests
        run: go test ./...

      # =========================
      # Install Gosec
      # =========================
      - name: Install Gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest

      # =========================
      # Security Scan (non-blocking)
      # =========================
      - name: Run Gosec Security Scan
        run: |
          ~/go/bin/gosec ./... || true

      # =========================
      # Configure Docker Buildx
      # =========================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # =========================
      # Login to Amazon ECR
      # =========================
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # =========================
      # Build Docker Image
      # =========================
      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY:${{ github.sha }} .

      # =========================
      # Scan Docker Image
      # =========================
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          format: table
          exit-code: 0
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      # =========================
      # Tag Docker Image
      # =========================
      - name: Tag Docker image
        run: |
          docker tag $ECR_REPOSITORY:${{ github.sha }} \
          093796422475.dkr.ecr.us-east-1.amazonaws.com/$ECR_REPOSITORY:${{ github.sha }}

      # =========================
      # Push Docker Image
      # =========================
      - name: Push Docker image to ECR
        run: |
          docker push \
          093796422475.dkr.ecr.us-east-1.amazonaws.com/$ECR_REPOSITORY:${{ github.sha }}

      # =========================
      # Deploy Backend
      # =========================
      - name: Deploy Backend
        run: |
          chmod +x ../../scripts/deploy-backend.sh
          ../../scripts/deploy-backend.sh ${{ github.sha }}